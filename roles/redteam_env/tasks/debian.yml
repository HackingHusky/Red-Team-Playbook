---
# Generic Debian/Ubuntu path.
#
# Kali-repo packages are unavailable here, so the equivalent toolkit is installed
# via each tool's native method: apt where the package exists, pipx for the Python
# tools, and prebuilt GitHub release binaries for the Go tools (no Go toolchain).
#
# Pinned versions and asset names below are the only things to bump on upgrade;
# confirm the asset names against the pinned release when changing a version.

- name: Set pinned tool versions and architecture mappings
  ansible.builtin.set_fact:
    ligolo_version: "0.8.2"
    amass_version: "4.2.0"
    # GitHub release assets use Go-style arch names (amd64/arm64), not x86_64.
    go_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_architecture] | default('amd64') }}"
    # pipx installs shared, on the global PATH, instead of into ~/.local/bin.
    pipx_env:
      PIPX_HOME: /opt/pipx
      PIPX_BIN_DIR: /usr/local/bin

# 1. Base packages available in the standard Debian/Ubuntu repos.
- name: Install base packages and install prerequisites
  ansible.builtin.apt:
    name:
      - terminator
      - pipx
      - curl
      - unzip
      - tar
      - git
    state: present
    update_cache: true

# 2. Launch the slow installs concurrently (async): pipx venvs build while the
#    Go-tool tarballs download in parallel. unarchive is an action plugin (no
#    async), so the fast local extraction runs afterwards.
- name: Define release-binary downloads
  ansible.builtin.set_fact:
    release_downloads:
      - name: ligolo-proxy
        url: "https://github.com/nicocha30/ligolo-ng/releases/download/v{{ ligolo_version }}/ligolo-ng_proxy_{{ ligolo_version }}_linux_{{ go_arch }}.tar.gz"
        dest: /tmp/ligolo-ng_proxy.tar.gz
      - name: ligolo-agent
        url: "https://github.com/nicocha30/ligolo-ng/releases/download/v{{ ligolo_version }}/ligolo-ng_agent_{{ ligolo_version }}_linux_{{ go_arch }}.tar.gz"
        dest: /tmp/ligolo-ng_agent.tar.gz
      - name: amass
        url: "https://github.com/owasp-amass/amass/releases/download/v{{ amass_version }}/amass_Linux_{{ go_arch }}.zip"
        dest: "/tmp/amass_{{ amass_version }}.zip"

- name: Launch pipx installs in the background
  community.general.pipx:
    name: "{{ item }}"
    state: present
  environment: "{{ pipx_env }}"
  loop:
    - certipy-ad       # certipy
    - bloodyAD         # bloodyad
    - bloodhound-ce    # BloodHound CE python ingestor (collector)
  async: 300
  poll: 0
  register: pipx_async

- name: Launch release-binary downloads in the background
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop: "{{ release_downloads }}"
  loop_control:
    label: "{{ item.name }}"
  async: 300
  poll: 0
  register: dl_async

- name: Wait for pipx installs to finish
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ pipx_async.results }}"
  loop_control:
    label: "{{ item.item }}"
  register: pipx_wait
  until: pipx_wait.finished
  retries: 60
  delay: 5

- name: Wait for release-binary downloads to finish
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ dl_async.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: dl_wait
  until: dl_wait.finished
  retries: 60
  delay: 5

# 3. Fast local extraction of the downloaded Go tools.
- name: Extract ligolo-ng proxy and agent binaries
  ansible.builtin.unarchive:
    src: "/tmp/ligolo-ng_{{ item }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    mode: '0755'
    creates: "/usr/local/bin/{{ item }}"
  loop:
    - proxy   # operator side
    - agent   # deploy to targets

- name: Extract amass into /opt
  ansible.builtin.unarchive:
    src: "/tmp/amass_{{ amass_version }}.zip"
    dest: /opt
    remote_src: true
    creates: "/opt/amass_Linux_{{ go_arch }}/amass"

- name: Symlink amass onto the global PATH
  ansible.builtin.file:
    src: "/opt/amass_Linux_{{ go_arch }}/amass"
    dest: /usr/local/bin/amass
    state: link

# 4. Optional heavyweight: BloodHound CE GUI (docker-based). Off by default so
#    throwaway VMs stay lightweight. Enable with -e bloodhound_gui=true.
- name: Install bloodhound-cli (BloodHound CE installer)
  ansible.builtin.unarchive:
    src: "https://github.com/SpecterOps/bloodhound-cli/releases/latest/download/bloodhound-cli-linux-{{ go_arch }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    mode: '0755'
    creates: /usr/local/bin/bloodhound-cli
  when: bloodhound_gui | default(false) | bool
