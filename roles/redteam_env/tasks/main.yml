---
# 1. Distro-Agnostic Setup (Combined from BlackArch & PimpMyKali logic)

# Resolve the operator account so the workspace lands in their home, not root's,
# even though tasks run via become. Prefers the user who invoked sudo; override
# with -e redteam_user=<name> if needed.
- name: Determine the operator account
  ansible.builtin.set_fact:
    redteam_user: "{{ redteam_user | default(ansible_env.SUDO_USER | default(ansible_user_id, true), true) }}"

- name: Look up the operator account's home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ redteam_user }}"

- name: Set the workspace base path
  ansible.builtin.set_fact:
    workspace_base: "{{ getent_passwd[redteam_user][4] }}/Workspace"

- name: Ensure custom workspace architecture exists
  ansible.builtin.file:
    path: "{{ workspace_base }}/{{ item }}"
    state: directory
    owner: "{{ redteam_user }}"
    group: "{{ redteam_user }}"
    mode: '0755'
  loop:
    - Recon
    - Exploits
    - OSINT

- name: Disable power management and screen blanking delays
  ansible.builtin.command:
    cmd: xset s off -dpms
  failed_when: false
  changed_when: false

# 2. Dynamic OS Routing
- name: Run Kali-native installation (apt)
  ansible.builtin.include_tasks: kali.yml
  when: ansible_distribution == "Kali"

- name: Run generic Debian/Ubuntu installation (native per-tool)
  ansible.builtin.include_tasks: debian.yml
  when: ansible_os_family == "Debian" and ansible_distribution != "Kali"

- name: Run Arch-family installations (BlackArch)
  ansible.builtin.include_tasks: arch.yml
  when: ansible_os_family == "Archlinux"
